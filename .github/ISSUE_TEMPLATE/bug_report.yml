name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug! Please fill in what you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I click X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: connection
    attributes:
      label: How do you connect?
      options:
        - Public demo (pokerth.ddns.net)
        - My own private server / LAN
        - pokerth.net
        - Not sure
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Browser & device / OS
      placeholder: e.g. Safari on iPad (iPadOS 18), or Chrome on Windows 11
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors (optional)
      description: Anything red in the browser dev-tools console, or proxy logs.
      render: text
