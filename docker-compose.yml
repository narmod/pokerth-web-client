services:
  pokerth-web-client:
    # Fixed container name so external tooling (nginx upstream by name,
    # scripts, `docker logs pokerth-web-client`) doesn't depend on the
    # compose project name / directory.
    container_name: pokerth-web-client
    # Prebuilt multi-arch image (amd64 / arm64 / armv7 — runs on Raspberry Pi).
    # `docker compose up -d` pulls it; `docker compose pull` updates it.
    # To build locally instead, comment out `image:` and uncomment `build: .`.
    image: ghcr.io/narmod/pokerth-web-client:latest
    # build: .
    # Left side = host port (configurable via .env). The container always
    # listens on 8080 internally.
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # Comma-separated allowlist of PokerTH servers the proxy is allowed to
      # dial. pokerth.net is included by default. ADD YOUR OWN SERVER HERE,
      # otherwise the proxy refuses the connection ("Host not in allowlist").
      # If your PokerTH server runs on the SAME machine as Docker, use
      # host.docker.internal (Docker Desktop) or the host's LAN IP — NOT
      # "localhost", which points to the container itself.
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-pokerth.net,www.pokerth.net}
      # Optional knobs (empty = feature default). Set them in a .env file next
      # to this compose file, or inline. Same semantics as the bare-metal
      # installer's settings.
      - ADMIN_ENABLED=${ADMIN_ENABLED:-}
      - STATS_ADMIN_TOKEN=${STATS_ADMIN_TOKEN:-}
      - STATS_RESET_PERIOD=${STATS_RESET_PERIOD:-}
      - PROXY_LOG_LEVEL=${PROXY_LOG_LEVEL:-}
      - PROXY_MAX_CLIENTS=${PROXY_MAX_CLIENTS:-}
      # Self-updating install — DEFAULT. On first start the entrypoint
      # provisions a git checkout of this repo into the pokerth-app volume and
      # runs the app from it; the /admin "Update" button then works out of the
      # box (install mode "docker-git"). Set SELF_UPDATE=0 in .env for the
      # classic immutable image (updates via docker compose pull && up -d).
      # Fully fail-safe: offline or volume problems fall back to the baked-in
      # image code — the container always starts.
      - SELF_UPDATE=${SELF_UPDATE:-1}
      - GIT_BRANCH=${GIT_BRANCH:-}
      - GIT_REPO=${GIT_REPO:-}
    volumes:
      # Persist ALL server-side state across container recreation: leaderboard,
      # admin-panel config, broadcasts, polls, visit counters, MySQL mirror
      # config, delegate API keys and per-player preferences (see Dockerfile).
      - pokerth-stats:/data
      # Working copy for the self-updating mode (default). Only used when
      # SELF_UPDATE=1; costs nothing otherwise.
      - pokerth-app:/srv/app
      #
      # SELF-UPDATE FROM THE ADMIN PAGE (optional). Install mode then reads
      # "docker-git" in /admin → Status and the "Update" button pulls,
      # reinstalls deps and restarts in place. Two ways to get it:
      #
      # (a) DEFAULT (SELF_UPDATE=1 above) — nothing to do. The entrypoint
      #     provisions a git checkout into the pokerth-app volume above and
      #     runs the app from it. Note: the code then comes from git, so
      #     `docker compose pull` alone no longer changes the running version
      #     — update from /admin (or `docker compose restart`, which
      #     re-syncs on boot). Opt out with SELF_UPDATE=0 in .env.
      #
      # (b) Bind-mount your own git clone over the baked-in code. The directory
      #     must be a real clone (NOT a submodule of another repo — its .git
      #     would point outside the mount) and writable by uid 1000, the
      #     container's `node` user.
      # - .:/app
      #
      # Without either, the image stays immutable and updates are done from the
      # host: docker compose pull && docker compose up -d.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pokerth-stats:
  pokerth-app:

# ── CasaOS metadata (ignored by plain `docker compose`) ──────────────────────
# Lets this exact file be pasted into CasaOS → App Store → Custom install →
# "Import" to install the web client as a CasaOS app. See docs/CASAOS.md.
x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: pokerth-web-client
  store_app_id: pokerth-web-client
  category: Games
  author: narmod
  developer: narmod
  icon: https://raw.githubusercontent.com/narmod/pokerth-web-client/HEAD/public/icon-192.png
  title:
    en_us: PokerTH Web Client
  tagline:
    en_us: Play PokerTH from any browser — phone, tablet or desktop.
    fr_fr: Jouez à PokerTH depuis n'importe quel navigateur.
  description:
    en_us: >-
      Modern web client for the open-source poker game PokerTH. Bridges browser
      WebSockets to any PokerTH server (pokerth.net by default), with offline
      bot training, 36 languages, themes, achievements and a family leaderboard.
    fr_fr: >-
      Client web moderne pour le jeu de poker open source PokerTH. Relie le
      navigateur à n'importe quel serveur PokerTH (pokerth.net par défaut),
      avec entraînement hors ligne contre des bots, 36 langues, thèmes,
      trophées et classement familial.
  scheme: http
  port_map: "8080"
  index: /
