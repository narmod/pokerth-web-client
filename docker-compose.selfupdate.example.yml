# ── Immutable-image install — EXAMPLE (opt-out of self-update) ────────────# Self-update from the admin page is now the DEFAULT (see docker-compose.yml):
# the container provisions its own git checkout and the /admin "Update" button
# works out of the box. You do NOT need this file for that.
#
# Copy this file to `docker-compose.override.yml` only if you want the classic
# IMMUTABLE image instead — the running code always matches the pulled image,
# and updates are done from the host:
#
#     docker compose pull && docker compose up -d
#
# You can also use it to pin a branch while keeping self-update on.

services:
  pokerth-web-client:
    environment:
      # Classic immutable image (disables the self-provisioned checkout):
      - SELF_UPDATE=0
      # … OR keep self-update but track another branch:
      # - SELF_UPDATE=1
      # - GIT_BRANCH=my-branch
