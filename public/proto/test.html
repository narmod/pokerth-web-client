<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PokerTH Proto Module — Self-Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0a1a0c;
    --fg: #e0d4a0;
    --gold: #c8a84a;
    --gold-dim: #8a7530;
    --green: #27ae60;
    --red: #c0392b;
    --border: rgba(200, 168, 74, 0.25);
    --mono: 'Consolas', 'Monaco', 'Courier New', monospace;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    line-height: 1.55;
    min-height: 100vh;
  }
  main { max-width: 880px; margin: 0 auto; padding: 24px 18px 60px; }
  h1 { color: var(--gold); margin: 0 0 6px; font-size: 1.6rem; letter-spacing: 0.05em; }
  .sub { color: var(--gold-dim); font-size: 0.85rem; margin-bottom: 30px; }
  .test {
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold-dim);
    background: rgba(255,255,255,0.02);
    padding: 14px 18px;
    margin: 14px 0;
    border-radius: 4px;
  }
  .test.pass { border-left-color: var(--green); }
  .test.fail { border-left-color: var(--red); }
  .test.pending { border-left-color: var(--gold); }
  .test h3 { margin: 0 0 8px; font-size: 1rem; color: var(--gold); }
  .test .status { display: inline-block; min-width: 70px; font-weight: bold; font-size: 0.85rem; }
  .test.pass .status { color: var(--green); }
  .test.fail .status { color: var(--red); }
  .test.pending .status { color: var(--gold-dim); }
  .detail {
    font-family: var(--mono);
    font-size: 0.8rem;
    background: rgba(0,0,0,0.4);
    padding: 8px 12px;
    margin: 6px 0 0;
    border-radius: 3px;
    color: #aaa;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .summary {
    margin-top: 26px;
    padding: 18px 22px;
    border-radius: 4px;
    text-align: center;
    font-size: 1.1rem;
    font-weight: bold;
  }
  .summary.ok  { background: rgba(39,174,96,0.12);  color: var(--green); border: 1px solid rgba(39,174,96,0.3); }
  .summary.bad { background: rgba(192,57,43,0.12);  color: var(--red);   border: 1px solid rgba(192,57,43,0.3); }
  .back { display: inline-block; margin-top: 24px; color: var(--gold-dim); text-decoration: none; font-size: 0.85rem; }
  .back:hover { color: var(--gold); }
</style>
</head>
<body>
<main>
  <h1>♠ PokerTH Proto Module — Self-Test</h1>
  <div class="sub">Validates that <code>public/proto/index.mjs</code> loads correctly and produces wire-format bytes identical to the upstream PokerTH protocol.</div>

  <div id="results"></div>
  <div id="summary" class="summary pending">Running tests…</div>

  <a href="/" class="back">← Back to PokerTH client</a>
</main>

<script type="module">
const results = document.getElementById('results');
const summary = document.getElementById('summary');
let passed = 0, failed = 0;

function record(name, ok, detail) {
  const div = document.createElement('div');
  div.className = 'test ' + (ok ? 'pass' : 'fail');
  div.innerHTML = `<h3><span class="status">${ok ? '✓ PASS' : '✗ FAIL'}</span> ${name}</h3>`;
  if (detail) {
    const d = document.createElement('div');
    d.className = 'detail';
    d.textContent = detail;
    div.appendChild(d);
  }
  results.appendChild(div);
  if (ok) passed++; else failed++;
}

function bytesToHex(bytes) {
  return [...bytes].map(b => b.toString(16).padStart(2, '0')).join('');
}

(async () => {
  let proto;

  // 1 — Module loads
  try {
    proto = await import('/proto/index.mjs');
    record('Import /proto/index.mjs',
      true,
      'Module loaded. Exports: ' + Object.keys(proto).sort().join(', '));
  } catch (e) {
    record('Import /proto/index.mjs', false,
      'Error: ' + e.message + '\n\nLikely causes:\n  • You are not on the refactor/architecture branch\n  • proxy.js does not serve .mjs as application/javascript\n  • Hit Ctrl+Shift+R to force a cache reload');
    finalize(); return;
  }

  // 2 — Required exports
  const expected = ['buildInit', 'buildChat', 'buildJoinGame', 'buildMyAction',
                    'decode', 'LoginType', 'MessageType', 'BUILD_ID'];
  const missing = expected.filter(k => !(k in proto));
  record('Required exports present',
    missing.length === 0,
    missing.length === 0
      ? 'All ' + expected.length + ' expected symbols are exported.'
      : 'Missing: ' + missing.join(', '));

  // 3 — Enum values are correct
  const enums_ok =
    proto.LoginType.guestLogin === 0 &&
    proto.LoginType.authenticatedLogin === 1 &&
    proto.LoginType.unauthenticatedLogin === 2 &&
    proto.BUILD_ID === 0x01020006;
  record('Enums + BUILD_ID match upstream',
    enums_ok,
    `LoginType.guestLogin = ${proto.LoginType.guestLogin}  (expected 0)
LoginType.authenticatedLogin = ${proto.LoginType.authenticatedLogin}  (expected 1)
LoginType.unauthenticatedLogin = ${proto.LoginType.unauthenticatedLogin}  (expected 2)
BUILD_ID = 0x${proto.BUILD_ID.toString(16)}  (expected 0x01020006)`);

  // 4 — buildInit() byte-for-byte matches the proxy log capture
  // Reference: real capture from user's proxy logs for an unauth Guest90134
  // [C→S] Init (29b) hex: 08021a190a040805100110868088082802320a47756573743930313334
  const expectedHex = '08021a190a040805100110868088082802320a47756573743930313334';
  const bytes = proto.buildInit({
    nick: 'Guest90134',
    major: 5,
    minor: 1,
    login: proto.LoginType.unauthenticatedLogin
  });
  const gotHex = bytesToHex(bytes);
  record('Encoded InitMessage matches real wire capture',
    gotHex === expectedHex,
    `expected: ${expectedHex}
got     : ${gotHex}
bytes   : ${bytes.length} (expected 29)`);

  // 5 — Authenticated InitMessage encodes the password into clientUserData
  const authBytes = proto.buildInit({
    nick: 'TestUser',
    major: 5,
    minor: 1,
    login: proto.LoginType.authenticatedLogin,
    password: 'secret123'
  });
  const authHex = bytesToHex(authBytes);
  const containsSecret = authHex.includes(
    'secret123'.split('').map(c => c.charCodeAt(0).toString(16).padStart(2,'0')).join('')
  );
  record('Authenticated InitMessage carries password in clientUserData',
    containsSecret,
    `hex: ${authHex}\nthe substring '736563726574313233' (= "secret123" in hex) ${containsSecret ? 'is' : 'is NOT'} present in the encoded bytes.`);

  // 6 — Round-trip encode/decode
  const decoded = proto.decode(authBytes);
  const rt_ok =
    decoded.messageType === proto.MessageType.Type_InitMessage &&
    decoded.initMessage.login === proto.LoginType.authenticatedLogin &&
    decoded.initMessage.nickName === 'TestUser' &&
    new TextDecoder().decode(decoded.initMessage.clientUserData) === 'secret123';
  record('Round-trip encode → decode preserves all fields',
    rt_ok,
    `messageType: ${decoded.messageType} (expected ${proto.MessageType.Type_InitMessage})
login: ${decoded.initMessage.login} (expected 1)
nickName: "${decoded.initMessage.nickName}" (expected "TestUser")
clientUserData (decoded): "${new TextDecoder().decode(decoded.initMessage.clientUserData)}" (expected "secret123")`);

  // 7 — buildChat
  const chatBytes = proto.buildChat('Hello world');
  const chatDecoded = proto.decode(chatBytes);
  record('buildChat produces a valid ChatRequestMessage',
    chatDecoded.messageType === proto.MessageType.Type_ChatRequestMessage &&
    chatDecoded.chatRequestMessage.chatText === 'Hello world',
    `hex: ${bytesToHex(chatBytes)}\ndecoded text: "${chatDecoded.chatRequestMessage.chatText}"`);

  finalize();
})();

function finalize() {
  if (failed === 0) {
    summary.className = 'summary ok';
    summary.textContent = `✓ All ${passed} tests passed — proto module is ready to wire in`;
  } else {
    summary.className = 'summary bad';
    summary.textContent = `✗ ${failed} test(s) failed — ${passed} passed`;
  }
}
</script>
</body>
</html>
