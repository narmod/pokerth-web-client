<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Discworld: Wirtshaus-Marke aus Silber. Gleiche Prägung wie der Dealer. -->
  <defs>
    <linearGradient id="rim" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#b8bec4"/>
      <stop offset="1" stop-color="#5c6268"/>
    </linearGradient>
    <radialGradient id="face" cx="36%" cy="30%" r="72%">
      <stop offset="0" stop-color="#f6f8fa"/>
      <stop offset="0.55" stop-color="#c3c9cf"/>
      <stop offset="1" stop-color="#7d848b"/>
    </radialGradient>
  </defs>
  <circle cx="20" cy="20" r="19" fill="url(#rim)" stroke="#474c52" stroke-width="1"/>
  <circle cx="20" cy="20" r="16.4" fill="url(#face)" stroke="#565c62" stroke-width="0.7"/>
  <circle cx="20" cy="20" r="14.1" fill="none" stroke="#565c62" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="20" y="26.6" text-anchor="middle" font-family="Georgia, serif" font-size="16"
        font-weight="700" fill="#ffffff" fill-opacity="0.35">SB</text>
  <text x="20" y="26" text-anchor="middle" font-family="Georgia, serif" font-size="16"
        font-weight="700" fill="#2e3338">SB</text>
</svg>
