<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 800">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dfe7f5"/>
      <stop offset="1" stop-color="#aab4cc"/>
    </linearGradient>
    <linearGradient id="deep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12234f"/>
      <stop offset="0.5" stop-color="#050a1e"/>
      <stop offset="1" stop-color="#0b1740"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4fe3ec" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#2aa7c8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#02081f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#02081f" stop-opacity="0"/>
      <stop offset="0.7" stop-color="#02081f" stop-opacity="0"/>
      <stop offset="1" stop-color="#02081f" stop-opacity="0.75"/>
    </radialGradient>
  </defs>

  <!-- card edge + dark space interior + glowing cyan bevel -->
  <rect x="9" y="9" width="562" height="782" rx="42" fill="url(#edge)" stroke="#8893ad" stroke-width="2"/>
  <rect x="40" y="40" width="500" height="720" rx="30" fill="url(#deep)"/>
  <rect x="40" y="40" width="500" height="720" rx="30" fill="none" stroke="#0aa6b4" stroke-width="14" opacity="0.35"/>
  <rect x="40" y="40" width="500" height="720" rx="30" fill="none" stroke="#4fe3ec" stroke-width="6"/>
  <rect x="40" y="40" width="500" height="720" rx="30" fill="none" stroke="#c8ffff" stroke-width="1.6" opacity="0.5" transform="translate(0 -2)"/>

  <!-- starfield -->
  <g fill="#dff6ff">
    <circle cx="96" cy="120" r="2.4" opacity="0.8"/>
    <circle cx="470" cy="150" r="1.8" opacity="0.6"/>
    <circle cx="150" cy="250" r="1.4" opacity="0.5"/>
    <circle cx="430" cy="300" r="2.6" opacity="0.75"/>
    <circle cx="110" cy="470" r="1.7" opacity="0.6"/>
    <circle cx="480" cy="520" r="2.2" opacity="0.7"/>
    <circle cx="130" cy="640" r="2.8" opacity="0.85"/>
    <circle cx="450" cy="670" r="1.5" opacity="0.55"/>
    <circle cx="300" cy="110" r="1.6" opacity="0.6"/>
    <circle cx="290" cy="700" r="2.0" opacity="0.7"/>
    <circle cx="210" cy="560" r="1.3" opacity="0.5"/>
    <circle cx="380" cy="230" r="1.3" opacity="0.5"/>
  </g>

  <!-- central Stardust emblem -->
  <circle cx="290" cy="400" r="230" fill="url(#halo)"/>
  <circle cx="290" cy="400" r="150" fill="none" stroke="#4fe3ec" stroke-width="2.5" opacity="0.5"/>
  <circle cx="290" cy="400" r="150" fill="none" stroke="#c8ffff" stroke-width="0.8" opacity="0.4"/>
  <!-- big sparkle (glow layer + core) -->
  <path d="M0,-1 L0.16,-0.16 L1,0 L0.16,0.16 L0,1 L-0.16,0.16 L-1,0 L-0.16,-0.16 Z" transform="translate(290 400) scale(150)" fill="#4fe3ec" opacity="0.35"/>
  <path d="M0,-1 L0.16,-0.16 L1,0 L0.16,0.16 L0,1 L-0.16,0.16 L-1,0 L-0.16,-0.16 Z" transform="translate(290 400) scale(118)" fill="#8ff2f8"/>
  <path d="M0,-1 L0.16,-0.16 L1,0 L0.16,0.16 L0,1 L-0.16,0.16 L-1,0 L-0.16,-0.16 Z" transform="translate(290 400) scale(60)" fill="#eafcff"/>
  <!-- accent sparkles -->
  <path d="M0,-1 L0.16,-0.16 L1,0 L0.16,0.16 L0,1 L-0.16,0.16 L-1,0 L-0.16,-0.16 Z" transform="translate(430 250) scale(30)" fill="#8ff2f8" opacity="0.9"/>
  <path d="M0,-1 L0.16,-0.16 L1,0 L0.16,0.16 L0,1 L-0.16,0.16 L-1,0 L-0.16,-0.16 Z" transform="translate(160 560) scale(26)" fill="#8ff2f8" opacity="0.85"/>
  <path d="M0,-1 L0.16,-0.16 L1,0 L0.16,0.16 L0,1 L-0.16,0.16 L-1,0 L-0.16,-0.16 Z" transform="translate(180 300) scale(16)" fill="#eafcff" opacity="0.8"/>
  <path d="M0,-1 L0.16,-0.16 L1,0 L0.16,0.16 L0,1 L-0.16,0.16 L-1,0 L-0.16,-0.16 Z" transform="translate(420 540) scale(18)" fill="#eafcff" opacity="0.8"/>

  <rect x="40" y="40" width="500" height="720" rx="30" fill="url(#vignette)"/>
</svg>
